# Ticket Triager — managed-agent template

name: ticket-triager
model: claude-sonnet-4-6

system:
  file: agents/ticket-triager.md
  append: "You are running headless. Produce files in ./out/; do not assume an open Office document."

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: web_fetch, enabled: true }
  - { type: mcp_toolset, mcp_server_name: slack, default_config: { enabled: true } }

mcp_servers:
  - { type: url, name: slack, url: "${SLACK_MCP_URL}" }

skills:
  - { from_plugin: . }

callable_agents: []
