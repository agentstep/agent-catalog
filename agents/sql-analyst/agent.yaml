# SQL Analyst — managed-agent template

name: sql-analyst
model: claude-sonnet-4-6

system:
  file: agents/sql-analyst.md
  append: "You are running headless. Produce files in ./out/; do not assume an open Office document."

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: write, enabled: true }
      - { name: web_fetch, enabled: true }
  - { type: mcp_toolset, mcp_server_name: postgres, default_config: { enabled: true } }

mcp_servers:
  - { type: url, name: postgres, url: "${POSTGRES_MCP_URL}" }

skills:
  - { from_plugin: . }

callable_agents: []
